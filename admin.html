<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Rexplore</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        
        /* Login Styles */
        #loginContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: rgba(19, 23, 41, 0.7);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-glow);
            animation: fadeInScale 0.6s ease-out;
        }
        .login-card h2 { margin-bottom: 2rem; text-align: center; color: var(--primary-light); }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.9rem; font-weight: 600; }
        .form-group input { 
            padding: 1rem; 
            background: var(--bg-tertiary); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: var(--radius-md); 
            color: white; 
        }

        /* Dashboard Styles */
        #adminDashboard { display: none; padding: 2rem; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .admin-item { 
            background: var(--bg-secondary); 
            padding: 1.5rem; 
            margin-bottom: 1rem; 
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info h4 { margin: 0; color: var(--primary-light); }
        .item-info p { margin: 0.5rem 0 0; color: var(--text-secondary); }
        .item-info .meta { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem; }
        
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
        .tab-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem; font-weight: 600; padding: 0.5rem 1rem; transition: var(--transition-base); }
        .tab-btn.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }
        
        .data-list { display: none; }
        .data-list.active { display: block; }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .display-status-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .display-status-group label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            #adminDashboard { padding: 1rem; }
            .header { flex-direction: column; gap: 1.5rem; align-items: stretch; text-align: center; }
            .header h1 { font-size: 1.8rem; }
            .header-actions { justify-content: center; }
            
            .tabs { overflow-x: auto; white-space: nowrap; padding-bottom: 0.5rem; -webkit-overflow-scrolling: touch; }
            .tab-btn { font-size: 1rem; padding: 0.5rem 0.8rem; }

            .admin-item { 
                flex-direction: column; 
                align-items: stretch; 
                gap: 1.5rem; 
                padding: 1.25rem;
            }
            .item-actions {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
                gap: 1rem;
            }
            .display-status-group select {
                width: 100%;
            }
            .delete-btn {
                width: 100%;
                justify-content: center;
                display: flex;
            }
            
            .login-card { padding: 2rem 1.5rem; margin: 0 1rem; width: calc(100% - 2rem); }
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginContainer">
        <div class="login-card">
            <h2>Admin Login</h2>
            <button id="googleLoginBtn" class="btn btn-primary btn-full" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                Sign in with Google
            </button>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
                Authorized Personnel Only
            </p>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="adminDashboard">
        <div class="admin-container">
            <div class="header">
                <h1>Rexplore Admin</h1>
                <div class="header-actions">
                    <button id="logoutBtn" class="btn btn-secondary">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                    <a href="index.html" class="btn btn-secondary">
                        <i class="fa-solid fa-house"></i> Site
                    </a>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-target="testimonialsList">Testimonials</button>
                <button class="tab-btn" data-target="demoList">Demo Requests</button>
                <button class="tab-btn" data-target="referralStats">Referral Stats</button>
            </div>

            <div id="testimonialsList" class="data-list active">
                <p>Loading testimonials...</p>
            </div>

            <div id="demoList" class="data-list">
                <p>Loading demo requests...</p>
            </div>

            <div id="referralStats" class="data-list">
                <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <h3 style="color: var(--primary-light); margin-bottom: 1.5rem;">Referral Leaderboard</h3>
                    <div id="referralContainer">
                        <p>Loading stats...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let db, auth;

        async function init() {
            try {
                // Force validated config for Localhost/Vercel symmetry
                const firebaseConfig = {
                    apiKey: "AIzaSyBFL1bBugLHZ7VI9bqncqnYD_HqDkPrrC8",
                    authDomain: "rexploretech.firebaseapp.com",
                    projectId: "rexploretech",
                    storageBucket: "rexploretech.firebasestorage.app",
                    messagingSenderId: "502051542015",
                    appId: "1:502051542015:web:a88b9d23b7be2b5aa04dca"
                };
                console.log("Config initialized:", firebaseConfig.projectId);

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                const provider = new GoogleAuthProvider();

                // Check Auth State
                onAuthStateChanged(auth, (user) => {
                    if (user && user.email === "ramunarlapati@gmail.com") {
                        showDashboard();
                    } else if (user) {
                        // User logged in but not the admin
                        alert("Unauthorized account: " + user.email);
                        signOut(auth);
                    } else {
                        showLogin();
                    }
                });

                // Google Login Handler
                document.getElementById('googleLoginBtn').onclick = async () => {
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (err) {
                        alert("Login failed: " + err.message);
                    }
                };

                // Logout Handler
                document.getElementById('logoutBtn').onclick = () => signOut(auth);

            } catch (err) {
                console.error(err);
                alert("Critical error: " + err.message);
            }
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            setupTabs();
            loadData("testimonials", "testimonialsList");
            loadData("demo_requests", "demoList");
            loadReferralStats();
        }

        function showLogin() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        }

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.data-list').forEach(l => l.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.target).classList.add('active');
                };
            });
        }

        function loadData(collectionName, containerId) {
            const container = document.getElementById(containerId);
            // Start with a simple query avoid index requirements initially
            const q = collection(db, collectionName);
            
            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                if (snapshot.empty) {
                    container.innerHTML = `<p>No ${collectionName.replace('_',' ')} found.</p>`;
                    return;
                }
                snapshot.forEach((docData) => {
                    const data = docData.data();
                    const id = docData.id;
                    const div = document.createElement('div');
                    div.className = 'admin-item';
                    
                    let content;
                    if (collectionName === "testimonials") {
                        content = `
                            <div class="item-info">
                                <h4 style="font-size: 1.2rem; margin-bottom: 0.5rem;">${data.name} <span style="font-size: 0.9rem; color: var(--warning-color); font-weight: 500;">(${data.rating} Stars)</span></h4>
                                <p style="font-style: italic; opacity: 0.9; margin-bottom: 1rem;">"${data.text}"</p>
                                <div class="meta">${data.timestamp?.toDate().toLocaleString() || 'No Date'}</div>
                            </div>
                            <div class="item-actions">
                                <div class="display-status-group">
                                    <label>Display Status</label>
                                    <select class="status-update form-control-professional" data-id="${id}" data-col="testimonials" style="padding: 0.6rem 2.5rem 0.6rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;">
                                        <option value="pending" ${data.status === 'pending' ? 'selected' : ''}>Pending</option>
                                        <option value="approved" ${data.status === 'approved' ? 'selected' : ''}>Approved</option>
                                        <option value="hidden" ${data.status === 'hidden' ? 'selected' : ''}>Hidden</option>
                                    </select>
                                </div>
                                <button class="btn btn-danger delete-btn" data-id="${id}" data-col="${collectionName}">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        `;
                    } else {
                        content = `
                            <div class="item-info">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                                    <div>
                                        <h4 style="font-size: 1.2rem;">${data.name}</h4>
                                        <div class="meta" style="margin-top: 4px;"> Interest: ${data.interest}</div>
                                    </div>
                                    <div style="text-align: right;">
                                        <code style="background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:6px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);">${id}</code>
                                        <button onclick="copyToClipboard('${id}')" class="btn btn-secondary" style="padding: 0.3rem 0.8rem; font-size: 0.75rem; margin-left: 5px;">Copy</button>
                                    </div>
                                </div>
                                
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                                    <p><strong>Email:</strong> ${data.email}</p>
                                    <p><strong>Phone:</strong> ${data.phone || 'N/A'}</p>
                                    <p><strong>Timeline:</strong> ${data.timeline || 'N/A'}</p>
                                    <p><strong>Budget:</strong> ${data.budget || 'N/A'}</p>
                                </div>
                                
                                <p style="margin-bottom: 0.5rem;"><strong>Requirements:</strong><br><span style="opacity: 0.8;">${data.requirements}</span></p>
                                <div class="meta" style="margin-top: 1rem;">${data.timestamp?.toDate().toLocaleString() || 'No Date'}</div>
                            </div>
                            <div class="item-actions">
                                <div class="display-status-group">
                                    <label>Step Status</label>
                                    <select class="status-update form-control-professional" data-id="${id}" data-col="demo_requests" style="padding: 0.6rem 2.5rem 0.6rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;">
                                        <option value="received" ${(data.status === 'received' || data.status === 'pending') ? 'selected' : ''}>Received</option>
                                        <option value="reviewed" ${data.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
                                        <option value="in-progress" ${data.status === 'in-progress' ? 'selected' : ''}>In-Progress</option>
                                        <option value="finalizing" ${data.status === 'finalizing' ? 'selected' : ''}>Finalizing</option>
                                        <option value="live" ${data.status === 'live' ? 'selected' : ''}>Live</option>
                                        <option value="rejected" ${data.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                                    </select>
                                </div>
                                <button class="btn btn-danger delete-btn" data-id="${id}" data-col="${collectionName}">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        `;
                    }
                    div.innerHTML = content;
                    container.appendChild(div);
                });

                container.querySelectorAll('.status-update').forEach(select => {
                    select.onchange = async () => {
                        const newStatus = select.value;
                        const docId = select.dataset.id;
                        const colName = select.dataset.col;
                        try {
                            await updateDoc(doc(db, colName, docId), { status: newStatus });
                            alert('Status updated successfully!');
                        } catch (err) {
                            alert('Error updating status: ' + err.message);
                        }
                    };
                });

                container.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.onclick = async () => {
                        if (confirm('Delete this record?')) {
                            await deleteDoc(doc(db, btn.dataset.col, btn.dataset.id));
                        }
                    };
                });
            }, (error) => {
                console.error("Error loading " + collectionName + ":", error);
                container.innerHTML = `<p style="color: #ff4757; padding: 20px; background: rgba(255,0,0,0.1); border-radius: 8px;">Error loading data: ${error.message}</p>`;
            });
        }

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.style = "position: fixed; top: 20px; right: 20px; background: #6366f1; color: white; padding: 10px 25px; border-radius: 8px; font-size: 0.85rem; z-index: 10000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s ease;";
                toast.innerHTML = `✓ ID Copied: ${text}`;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        };

        function loadReferralStats() {
            const container = document.getElementById('referralContainer');
            const q = collection(db, "demo_requests");
            
            onSnapshot(q, (snapshot) => {
                const stats = {};
                snapshot.forEach(docData => {
                    const data = docData.data();
                    const ref = data.referral;
                    if (ref && ref !== 'none' && ref !== '') {
                        stats[ref] = (stats[ref] || 0) + 1;
                    }
                });

                container.innerHTML = '';
                const sortedRefs = Object.entries(stats).sort((a, b) => b[1] - a[1]);

                if (sortedRefs.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted);">No referrals tracked yet.</p>';
                    return;
                }

                const table = document.createElement('table');
                table.style.width = '100%';
                table.style.borderCollapse = 'collapse';
                table.innerHTML = `
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid rgba(255,255,255,0.1);">
                            <th style="padding: 10px; color: var(--text-secondary);">User (Email)</th>
                            <th style="padding: 10px; color: var(--text-secondary); text-align: right;">Total Referrals</th>
                        </tr>
                    </thead>
                    <tbody id="refTableBody"></tbody>
                `;
                
                const tbody = table.querySelector('#refTableBody');
                sortedRefs.forEach(([email, count]) => {
                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                    row.innerHTML = `
                        <td style="padding: 12px; font-weight: 500;">${email}</td>
                        <td style="padding: 12px; text-align: right; font-weight: 800; color: var(--primary-color);">${count} members</td>
                    `;
                    tbody.appendChild(row);
                });
                container.appendChild(table);
            });
        }

        init();
    </script>
</body>
</html>
